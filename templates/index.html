<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МемСайт</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --glow: #7c3aed55;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --error: #f87171;
    --success: #34d399;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 70% 20%, #7c3aed18 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, #a855f710 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    padding: 20px 40px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900; font-size: 1.2rem;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .nav-auth { display: flex; gap: 12px; align-items: center; }
  .nav-user { display: flex; align-items: center; gap: 16px; }

  .username-badge {
    font-size: 0.85rem; color: var(--accent2); font-weight: 500;
    padding: 6px 14px;
    background: var(--glow);
    border: 1px solid var(--accent); border-radius: 20px;
  }

  .btn {
    padding: 10px 22px; border-radius: 8px;
    font-family: 'Onest', sans-serif; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s ease; border: none; outline: none;
  }

  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); background: var(--glow); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; box-shadow: 0 0 20px var(--glow);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 35px var(--glow), 0 4px 15px rgba(124,58,237,0.4);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-logout {
    background: transparent; color: var(--error);
    border: 1px solid rgba(248,113,113,0.3);
    font-size: 0.8rem; padding: 7px 16px;
  }
  .btn-logout:hover { background: rgba(248,113,113,0.1); border-color: var(--error); }

  main { position: relative; z-index: 1; }

  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 120px 20px 60px;
  }

  .hero-tag {
    font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent2);
    margin-bottom: 24px; font-weight: 500;
  }

  .hero-title {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900; line-height: 1.05; letter-spacing: -0.03em;
    margin-bottom: 20px;
    background: linear-gradient(160deg, #fff 30%, #a855f7 70%, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    font-size: 1.1rem; color: var(--muted); margin-bottom: 48px;
    font-weight: 300; letter-spacing: 0.01em;
  }

  .meme-btn {
    position: relative; padding: 18px 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-family: 'Unbounded', sans-serif;
    font-weight: 700; font-size: 1rem; letter-spacing: 0.02em;
    border: none; border-radius: 12px; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 40px var(--glow), 0 8px 32px rgba(124,58,237,0.3);
    overflow: hidden;
  }
  .meme-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .meme-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 60px var(--glow), 0 16px 40px rgba(124,58,237,0.5);
  }
  .meme-btn:hover::before { opacity: 1; }
  .meme-btn:active { transform: translateY(-1px) scale(0.99); }
.meme-container {
    margin-top: 60px; opacity: 0;
    transform: translateY(30px) scale(0.95);
    transition: all 0.7s cubic-bezier(0.34,1.2,0.64,1);
    pointer-events: none;
  }
  .meme-container.visible {
    opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
  }

  .meme-frame {
    position: relative; display: inline-block;
    border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 80px var(--glow), 0 32px 64px rgba(0,0,0,0.6);
  }
  .meme-frame::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.15), transparent 50%);
    z-index: 1; pointer-events: none;
  }
  .meme-frame img {
    display: block; max-width: min(500px, 85vw); border-radius: 16px;
  }
  .meme-caption { margin-top: 16px; font-size: 0.85rem; color: var(--muted); font-style: italic; }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.active { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 40px;
    width: 100%; max-width: 420px; position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 120px var(--glow);
    animation: modalIn 0.4s cubic-bezier(0.34,1.4,0.64,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--muted);
    font-size: 1.5rem; cursor: pointer; transition: color 0.2s; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-title {
    font-family: 'Unbounded', sans-serif; font-size: 1.5rem; font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .modal-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 36px; }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }

  .form-input {
    width: 100%; padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Onest', sans-serif; font-size: 0.95rem;
    transition: all 0.2s; outline: none;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  .form-input::placeholder { color: var(--muted); }

  .form-error {
    display: none; font-size: 0.8rem; color: var(--error);
    margin-top: 8px; padding: 10px 14px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25); border-radius: 8px;
  }
  .form-error.show { display: block; }

  .form-success {
    display: none; font-size: 0.8rem; color: var(--success);
    margin-top: 8px; padding: 10px 14px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.25); border-radius: 8px;
  }
  .form-success.show { display: block; }

  .btn-full { width: 100%; padding: 15px; margin-top: 8px; font-size: 1rem; border-radius: 10px; }

  .modal-switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted); }
  .modal-switch a { color: var(--accent2); text-decoration: none; font-weight: 500; cursor: pointer; transition: color 0.2s; }
  .modal-switch a:hover { color: white; }

  @media (max-width: 600px) {
    nav { padding: 16px 20px; }
    .modal { padding: 36px 24px; }
  }
</style>
</head>
<body>
<nav>
  <div class="logo">МЕМ·САЙТ</div>
  <div class="nav-auth" id="navGuest">
    <button class="btn btn-ghost" onclick="openModal('login')">Вход</button>
    <button class="btn btn-primary" onclick="openModal('register')">Регистрация</button>
  </div>
  <div class="nav-user" id="navUser" style="display:none">
    <span class="username-badge" id="usernameDisplay"></span>
    <button class="btn btn-logout" onclick="logout()">Выйти</button>
  </div>
</nav>

<main>
  <section class="hero">
    <p class="hero-tag">✦ Добро пожаловать ✦</p>
    <h1 class="hero-title">Тут живут<br>мемы</h1>
    <p class="hero-sub">Нажми кнопку. Ты знаешь что делать.</p>
    <button class="meme-btn" onclick="revealMeme()">нажми пж</button>
    <div class="meme-container" id="memeContainer">
      <div class="meme-frame">
        <img src="/static/image.png" alt="Мем" onerror="this.src='https://i.imgflip.com/30b1gx.jpg'">
      </div>
      <p class="meme-caption">ты нажал. ты это сделал.</p>
    </div>
  </section>
</main>

<div class="overlay" id="overlay" onclick="closeOnBackdrop(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>

    <div id="loginForm">
      <h2 class="modal-title">Добро пожаловать</h2>
      <p class="modal-sub">Войди в свой аккаунт</p>
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input class="form-input" type="text" id="loginUsername" placeholder="твой логин">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') login()">
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn btn-primary btn-full" onclick="login()">Войти</button>
      <div class="modal-switch">Нет аккаунта? <a onclick="switchModal('register')">Зарегистрироваться</a></div>
    </div>

    <div id="registerForm" style="display:none">
      <h2 class="modal-title">Регистрация</h2>
      <p class="modal-sub">Создай новый аккаунт</p>
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input class="form-input" type="text" id="regUsername" placeholder="придумай логин">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" id="regPassword" placeholder="минимум 4 символа">
      </div>
      <div class="form-group">
        <label class="form-label">Повтор пароля</label>
        <input class="form-input" type="password" id="regConfirm" placeholder="повтори пароль"
               onkeydown="if(event.key==='Enter') register()">
      </div>
      <div class="form-error" id="registerError"></div>
      <div class="form-success" id="registerSuccess"></div>
      <button class="btn btn-primary btn-full" onclick="register()">Создать аккаунт</button>
      <div class="modal-switch">Уже есть аккаунт? <a onclick="switchModal('login')">Войти</a></div>
    </div>
  </div>
</div>

<script>
  async function checkAuth() {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (data.ok) {
      setUser(data.username);
    } else {
      setGuest();
    }
  }

  function setUser(username) {
    document.getElementById('navGuest').style.display = 'none';
    document.getElementById('navUser').style.display = 'flex';
    document.getElementById('usernameDisplay').textContent = '👤 ' + username;
  }

  function setGuest() {
    document.getElementById('navGuest').style.display = 'flex';
    document.getElementById('navUser').style.display = 'none';
  }

  function revealMeme() {
    document.getElementById('memeContainer').classList.toggle('visible');
  }

  function openModal(type) {
    document.getElementById('overlay').classList.add('active');
    switchModal(type);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    clearErrors();
  }
function closeOnBackdrop(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function switchModal(type) {
    document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
    clearErrors();
  }

  function clearErrors() {
    ['loginError', 'registerError', 'registerSuccess'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('show');
      el.textContent = '';
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.ok) {
      closeModal();
      setUser(data.username);
    } else {
      showError('loginError', data.error);
    }
  }

  async function register() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, confirm })
    });
    const data = await res.json();
    if (data.ok) {
      showSuccess('registerSuccess', '✓ Аккаунт создан! Входим...');
      setTimeout(() => { closeModal(); setUser(data.username); }, 900);
    } else {
      showError('registerError', data.error);
    }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    setGuest();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  checkAuth();
</script>
</body>
</html>
